<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#101114">
<title>YOS</title>
<style>
:root{color-scheme:dark;--bg:#08090b;--card:#131519;--line:rgba(255,255,255,.1);--text:#f7f5ef;--muted:#a8a9ad;--gold:#e6b94e;--coral:#ff806f;--mint:#64d2ad}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,rgba(230,185,78,.14),transparent 28%),radial-gradient(circle at 100% 10%,rgba(255,128,111,.12),transparent 28%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}.app{width:min(100%,620px);margin:auto;padding:calc(env(safe-area-inset-top) + 28px) 18px calc(env(safe-area-inset-bottom) + 28px)}.mark{display:grid;place-items:center;width:58px;height:58px;border:1px solid rgba(230,185,78,.5);border-radius:19px;color:var(--gold);font-size:25px;font-weight:1000}.top h1{margin:18px 0 5px;font-size:42px;letter-spacing:-.04em}.top p{margin:0;color:var(--muted);font-size:14px;line-height:1.6}.grid{display:grid;gap:14px;margin-top:30px}.card{position:relative;overflow:hidden;display:block;min-height:190px;padding:22px;border:1px solid var(--line);border-radius:28px;color:inherit;text-decoration:none;background:var(--card);box-shadow:0 24px 70px rgba(0,0,0,.28)}.card:after{content:"";position:absolute;width:170px;height:170px;border-radius:50%;right:-55px;bottom:-65px;opacity:.25}.taxi{background:linear-gradient(145deg,#17140d,#0d0f12 64%)}.taxi:after{background:var(--gold)}.life{background:linear-gradient(145deg,#fff5e8,#effbf6);color:#25313b}.life:after{background:linear-gradient(135deg,var(--coral),var(--mint))}.label{font-size:11px;font-weight:900;letter-spacing:.14em}.taxi .label{color:var(--gold)}.life .label{color:var(--coral)}.card h2{margin:12px 0 8px;font-size:32px}.card p{max-width:74%;margin:0;color:var(--muted);font-size:13px;line-height:1.65}.life p{color:#6e7780}.arrow{position:absolute;right:24px;top:25px;font-size:28px}.footer{margin-top:22px;color:var(--muted);font-size:11px;text-align:center}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="mark">Y</div><h1>YOS</h1><p>仕事も生活も、ひとつの司令塔から。</p></header>
<section class="grid">
<a class="card taxi" href="./taxi/"><span class="label">NIGHT SHIFT DRIVE</span><h2>YOS Taxi</h2><p>営業判断、売上、乗車記録、営業カレンダー。</p><span class="arrow">›</span></a>
<a class="card life" href="./life/"><span class="label">YOUR ONLY LIFE SYSTEM</span><h2>YOS Life</h2><p>予定、タスク、ルーティン、体調、天気を整える。</p><span class="arrow">›</span></a>
</section>
<footer class="footer">YOS is the only command center.</footer>
</main>
</body>
</html>
