<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050607">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YOS Life">
<link rel="manifest" href="./manifest.webmanifest">
<title>YOS Life OS</title>
<style>
:root{color-scheme:dark;--bg:#050607;--panel:#0d0f11;--panel2:#14171a;--line:rgba(224,177,64,.22);--gold:#e0b140;--gold2:#f5ce72;--text:#f6f3eb;--muted:#aaa69d;--green:#62d593;--red:#ff7f86}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -15%,rgba(224,177,64,.11),transparent 34%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;-webkit-font-smoothing:antialiased}button,input,textarea{font:inherit}.app{width:min(100%,720px);margin:auto;padding:calc(env(safe-area-inset-top) + 12px) 14px calc(env(safe-area-inset-bottom) + 32px)}
.top{display:grid;grid-template-columns:44px 1fr auto;gap:11px;align-items:center;margin-bottom:14px}.mark{display:grid;place-items:center;width:44px;height:44px;border:1px solid rgba(224,177,64,.45);border-radius:14px;color:var(--gold);font-size:20px;font-weight:900;background:#090a0b}.brand{text-align:center}.brand h1{margin:0;color:var(--gold2);font-size:25px;letter-spacing:.02em}.brand p{margin:3px 0 0;color:#b7954a;font-size:9px;font-weight:800;letter-spacing:.18em}.clock{text-align:right;color:var(--muted);font-size:10px}.clock strong{display:block;color:var(--text);font-size:17px;font-variant-numeric:tabular-nums}
.hero{display:grid;grid-template-columns:1fr 116px;gap:14px;align-items:center;border:1px solid rgba(224,177,64,.34);border-radius:24px;padding:18px;background:linear-gradient(145deg,rgba(224,177,64,.08),rgba(13,15,17,.97) 58%);margin-bottom:12px}.eyebrow{color:var(--gold);font-size:11px;font-weight:900}.hero h2{margin:6px 0 5px;font-size:27px;line-height:1.25}.hero p{margin:0;color:var(--muted);font-size:12px;line-height:1.55}.ring{--p:0deg;display:grid;place-items:center;width:108px;height:108px;border-radius:50%;background:conic-gradient(var(--gold) 0 var(--p),#25272a var(--p) 360deg)}.ring:before{content:"";grid-area:1/1;width:86px;height:86px;border-radius:50%;background:#0b0d0f}.ring div{grid-area:1/1;z-index:1;text-align:center}.ring strong{display:block;font-size:27px;font-variant-numeric:tabular-nums}.ring span{font-size:10px;color:var(--muted)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.metric{border:1px solid var(--line);border-radius:18px;padding:13px 10px;background:var(--panel)}.metric strong{display:block;font-size:20px;font-variant-numeric:tabular-nums}.metric span{color:var(--muted);font-size:10px}.panel{border:1px solid var(--line);border-radius:22px;padding:15px;background:var(--panel);margin-bottom:12px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.panel h3{margin:0;font-size:17px}.tag{color:var(--gold);font-size:10px;font-weight:900}.next{border-left:3px solid var(--gold);padding:11px 12px;border-radius:10px;background:rgba(224,177,64,.07);margin-bottom:12px}.next span{display:block;color:var(--gold);font-size:10px;font-weight:900}.next strong{display:block;margin-top:5px;font-size:21px}
.checkin{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.check{display:grid;gap:6px}.check label{color:var(--muted);font-size:10px}.check input{width:100%;min-height:46px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text);text-align:center;font-weight:800;outline:none}.save{width:100%;min-height:48px;margin-top:10px;border:0;border-radius:14px;background:linear-gradient(145deg,var(--gold2),#c99320);color:#171006;font-weight:900}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}.tab{min-height:42px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--muted);font-weight:800}.tab.active{background:rgba(224,177,64,.14);color:var(--gold2);border-color:rgba(224,177,64,.45)}.routine{display:grid;gap:8px}.routine-item{display:flex;align-items:center;gap:10px;min-height:52px;border:1px solid rgba(255,255,255,.07);border-radius:15px;padding:10px 12px;background:#0a0c0e}.routine-item button{flex:0 0 31px;width:31px;height:31px;border:1px solid rgba(224,177,64,.35);border-radius:10px;background:transparent;color:transparent}.routine-item.done{opacity:.58}.routine-item.done button{background:var(--gold);color:#171006}.routine-item b{font-size:14px}.routine-item small{display:block;color:var(--muted);font-size:10px;margin-top:2px}
.tasks{display:grid;gap:8px}.task{display:grid;grid-template-columns:34px 1fr;gap:9px;align-items:center}.task button{width:34px;height:34px;border:1px solid rgba(224,177,64,.35);border-radius:11px;background:var(--panel2);color:transparent}.task.done button{background:var(--gold);color:#171006}.task input{width:100%;min-height:46px;border:1px solid rgba(255,255,255,.08);border-radius:13px;background:var(--panel2);color:var(--text);padding:0 12px;outline:none}.task.done input{text-decoration:line-through;color:var(--muted)}
textarea{width:100%;min-height:92px;border:1px solid var(--line);border-radius:15px;padding:12px;background:var(--panel2);color:var(--text);resize:vertical;outline:none}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.actions button,.links a{display:flex;align-items:center;justify-content:center;min-height:48px;border:1px solid var(--line);border-radius:14px;background:var(--panel2);color:var(--text);text-decoration:none;font-weight:900}.actions .primary{border:0;background:linear-gradient(145deg,var(--gold2),#c99320);color:#171006}.links{display:grid;grid-template-columns:1fr 1fr;gap:8px}.footer{text-align:center;color:var(--muted);font-size:10px;padding:8px 0 0}
dialog{width:min(calc(100% - 24px),560px);border:1px solid var(--line);border-radius:22px;background:#0d0f11;color:var(--text);padding:0}dialog::backdrop{background:rgba(0,0,0,.75)}.dialog{padding:18px}.dialog h3{margin:0 0 14px}.field{display:grid;gap:6px}.field label{font-size:11px;color:var(--muted)}.field input{width:100%;min-height:48px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text);padding:0 12px}.dialog-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:8px;margin-top:14px}.dialog-actions button{min-height:48px;border:1px solid var(--line);border-radius:13px;background:var(--panel2);color:var(--text);font-weight:900}.dialog-actions .primary{border:0;background:var(--gold);color:#171006}
@media(max-width:380px){.hero{grid-template-columns:1fr 100px;padding:15px}.ring{width:96px;height:96px}.ring:before{width:76px;height:76px}.hero h2{font-size:24px}.checkin{gap:5px}.metric strong{font-size:18px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="mark">Y</div><div class="brand"><h1>YOS Life</h1><p>YOUR ONLY SYSTEM</p></div><div class="clock"><strong id="clock">--:--</strong><span id="date">----</span></div></header>
<section class="hero"><div><span class="eyebrow">今の状態</span><h2 id="stateTitle">今日を整える</h2><p id="stateDetail">まず現在の状態を記録します。</p></div><div class="ring" id="ring"><div><strong id="rate">0%</strong><span>今日の完了率</span></div></div></section>
<section class="grid3"><div class="metric"><strong id="sleepMetric">—</strong><span>睡眠</span></div><div class="metric"><strong id="healthMetric">—</strong><span>体調</span></div><div class="metric"><strong id="streakMetric">0日</strong><span>継続</span></div></section>
<section class="panel"><div class="panel-head"><h3>状態チェック</h3><span class="tag">30秒</span></div><div class="checkin"><div class="check"><label>睡眠時間</label><input id="sleep" type="number" min="0" max="24" step="0.5" inputmode="decimal" placeholder="時間"></div><div class="check"><label>体調 1〜5</label><input id="health" type="number" min="1" max="5" step="1" inputmode="numeric" placeholder="3"></div><div class="check"><label>気分 1〜5</label><input id="mood" type="number" min="1" max="5" step="1" inputmode="numeric" placeholder="3"></div></div><button class="save" id="saveCheckin">状態を保存</button></section>
<section class="panel"><div class="panel-head"><h3>今やること</h3><span class="tag" id="routineTag">起床</span></div><div class="next"><span>NEXT ACTION</span><strong id="nextAction">水を飲む</strong></div><div class="tabs"><button class="tab active" data-group="wake">起床</button><button class="tab" data-group="before">仕事前</button><button class="tab" data-group="home">帰宅後</button></div><div id="routine" class="routine"></div></section>
<section class="panel"><div class="panel-head"><h3>今日やる3つ</h3><span class="tag">3つまで</span></div><div id="tasks" class="tasks"></div></section>
<section class="panel"><div class="panel-head"><h3>YOSへ渡す</h3><span class="tag">違和感もデータ</span></div><textarea id="note" placeholder="気になること、違和感、相談したいこと"></textarea><div class="actions"><button id="settingsButton">設定</button><button id="sendButton" class="primary">YOSへ送る</button></div></section>
<section class="panel"><div class="panel-head"><h3>つながる</h3><span class="tag">既存資産</span></div><div class="links"><a href="../taxi/">YOS Taxi</a><a href="../">Mission Control</a></div></section>
<footer class="footer">端末内へ自動保存・オフライン対応・YOSが唯一の司令塔</footer>
</main>
<dialog id="settingsDialog"><form method="dialog" class="dialog"><h3>設定</h3><div class="field"><label for="yosUrl">YOSチャットURL</label><input id="yosUrl" type="url" placeholder="https://chatgpt.com/..."></div><div class="dialog-actions"><button value="cancel">取消</button><button id="saveSettings" class="primary" value="default">保存</button></div></form></dialog>
<script>
'use strict';
(()=>{
const KEY='yos-life-v1',SETTINGS='yos-life-settings-v1',TAXI='yos-taxi-settings-v2';
const routines={wake:[['水を飲む','起きたら最初に1杯'],['ストレッチ','体をゆっくり起こす'],['シャワー','頭と体を切り替える'],['歯磨き','片足立ちを組み合わせる'],['身支度','出発できる状態にする'],['瞑想','短くても実行する']],before:[['洗濯確認','必要な日だけ回す'],['持ち物確認','財布・鍵・充電'],['今日の予定確認','無理のない順番にする'],['YOS相談','仕事前の判断を整える']],home:[['洗顔','帰宅後すぐ'],['歯磨き','寝る準備へつなぐ'],['水分補給','少量でよい'],['就寝準備','画面を閉じて横になる']]};
const today=()=>new Intl.DateTimeFormat('sv-SE',{timeZone:'Asia/Tokyo'}).format(new Date());
const fresh=()=>({days:{},activeGroup:'wake'});
let data=(()=>{try{return JSON.parse(localStorage.getItem(KEY)||'null')||fresh()}catch{return fresh()}})();
let settings=(()=>{try{return JSON.parse(localStorage.getItem(SETTINGS)||'{}')}catch{return{}}})();
const day=()=>data.days[today()]||(data.days[today()]={checkin:{sleep:'',health:'',mood:''},routines:{wake:[],before:[],home:[]},tasks:[{text:'',done:false},{text:'',done:false},{text:'',done:false}],note:''});
const save=()=>{localStorage.setItem(KEY,JSON.stringify(data));paint()};
const el=id=>document.getElementById(id);
function completion(){const d=day(),all=Object.entries(d.routines).flatMap(([g,a])=>routines[g].map((_,i)=>a.includes(i))),taskSet=d.tasks.filter(t=>t.text.trim()),checks=[d.checkin.sleep,d.checkin.health,d.checkin.mood].filter(v=>String(v).trim()!=='');const total=all.length+taskSet.length+3,done=all.filter(Boolean).length+taskSet.filter(t=>t.done).length+checks.length;return total?Math.round(done/total*100):0}
function streak(){const keys=Object.keys(data.days).sort().reverse(),now=new Date(`${today()}T12:00:00`);let n=0;for(let i=0;i<365;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=new Intl.DateTimeFormat('sv-SE',{timeZone:'Asia/Tokyo'}).format(d),x=data.days[k];if(x&&(x.checkin?.sleep||x.checkin?.health||x.checkin?.mood||Object.values(x.routines||{}).some(a=>a.length)||x.tasks?.some(t=>t.text)))n++;else break}return n}
function nextAction(){const d=day(),g=data.activeGroup||'wake',done=d.routines[g]||[],idx=routines[g].findIndex((_,i)=>!done.includes(i));if(idx>=0)return routines[g][idx][0];const task=d.tasks.find(t=>t.text.trim()&&!t.done);return task?task.text:'今日の記録は完了'}
function stateCopy(p){const d=day();if(!d.checkin.sleep&&!d.checkin.health&&!d.checkin.mood)return['今日を整える','まず現在の状態を記録します。'];if(Number(d.checkin.health)&&Number(d.checkin.health)<=2)return['回復を優先','今日は負荷を下げ、安全と休養を優先します。'];if(p>=90)return['今日の流れは整った','残りは無理を増やさず、静かに終えます。'];return['次の一つだけ進める',`次は「${nextAction()}」です。`]}
function renderRoutine(){const d=day(),g=data.activeGroup||'wake',list=el('routine');list.innerHTML='';el('routineTag').textContent={wake:'起床',before:'仕事前',home:'帰宅後'}[g];routines[g].forEach(([name,sub],i)=>{const done=d.routines[g].includes(i),row=document.createElement('div');row.className=`routine-item${done?' done':''}`;row.innerHTML=`<button aria-label="${name}を完了">✓</button><div><b>${name}</b><small>${sub}</small></div>`;row.querySelector('button').onclick=()=>{const a=d.routines[g],at=a.indexOf(i);at>=0?a.splice(at,1):a.push(i);save()};list.appendChild(row)})}
function renderTasks(){const d=day(),box=el('tasks');box.innerHTML='';d.tasks.forEach((t,i)=>{const row=document.createElement('div');row.className=`task${t.done?' done':''}`;row.innerHTML=`<button aria-label="タスク${i+1}を完了">✓</button><input maxlength="60" placeholder="${i+1}. 今日やること">`;const input=row.querySelector('input');input.value=t.text;row.querySelector('button').onclick=()=>{t.done=!t.done;save()};input.onchange=()=>{t.text=input.value.trim();save()};box.appendChild(row)})}
function paint(){const d=day(),p=completion(),copy=stateCopy(p),n=new Date();el('clock').textContent=new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Tokyo'}).format(n);el('date').textContent=new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric',weekday:'short',timeZone:'Asia/Tokyo'}).format(n);el('rate').textContent=`${p}%`;el('ring').style.setProperty('--p',`${p*3.6}deg`);el('stateTitle').textContent=copy[0];el('stateDetail').textContent=copy[1];el('sleepMetric').textContent=d.checkin.sleep?`${d.checkin.sleep}h`:'—';el('healthMetric').textContent=d.checkin.health?`${d.checkin.health}/5`:'—';el('streakMetric').textContent=`${streak()}日`;el('sleep').value=d.checkin.sleep;el('health').value=d.checkin.health;el('mood').value=d.checkin.mood;el('note').value=d.note;el('nextAction').textContent=nextAction();document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.group===(data.activeGroup||'wake')));renderRoutine();renderTasks()}
el('saveCheckin').onclick=()=>{const d=day();d.checkin={sleep:el('sleep').value,health:el('health').value,mood:el('mood').value};save()};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{data.activeGroup=b.dataset.group;save()});
el('note').onchange=()=>{day().note=el('note').value;save()};
el('settingsButton').onclick=()=>{el('yosUrl').value=settings.yosUrl||'';el('settingsDialog').showModal()};
el('saveSettings').onclick=()=>{settings.yosUrl=el('yosUrl').value.trim();localStorage.setItem(SETTINGS,JSON.stringify(settings))};
function taxiUrl(){try{return JSON.parse(localStorage.getItem(TAXI)||'{}').yosUrl||''}catch{return''}}
function summary(){const d=day(),doneTasks=d.tasks.filter(t=>t.done&&t.text).map(t=>t.text),openTasks=d.tasks.filter(t=>!t.done&&t.text).map(t=>t.text);return[`【今日の予定】Life OSから相談`,`日付：${today()}`,`睡眠：${d.checkin.sleep||'未記録'}時間`,`体調：${d.checkin.health||'未記録'}/5`,`気分：${d.checkin.mood||'未記録'}/5`,`完了率：${completion()}%`,`完了：${doneTasks.join('、')||'なし'}`,`残り：${openTasks.join('、')||nextAction()}`,`違和感・相談：${d.note||'なし'}`,`次に何を優先すべきか、簡単に判断して。`].join('\n')}
el('sendButton').onclick=async()=>{day().note=el('note').value;save();const text=summary();try{await navigator.clipboard.writeText(text)}catch{prompt('この内容をコピーしてください',text);return}const url=settings.yosUrl||taxiUrl();if(url.startsWith('https://chatgpt.com/'))location.href=url;else{alert('内容をコピーしました。設定でYOSチャットURLを登録してください。');el('settingsDialog').showModal()}};
setInterval(paint,30000);paint();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');
})();
</script>
</body>
</html>
