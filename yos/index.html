<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YOS">
<link rel="manifest" href="./manifest.webmanifest">
<title>YOS｜Your Only System</title>
<style>
:root{color-scheme:dark;--bg:#080a10;--panel:#111521;--panel2:#171c2a;--line:rgba(255,255,255,.09);--text:#f8f7f2;--muted:#9ba3b3;--gold:#e8bd58;--gold2:#ffd87c;--blue:#79a7ff;--coral:#ff8a76;--mint:#63d3af}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%,rgba(232,189,88,.15),transparent 34%),radial-gradient(circle at 100% 20%,rgba(121,167,255,.10),transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;-webkit-font-smoothing:antialiased}button,input{font:inherit}button{touch-action:manipulation}.app{width:min(100%,720px);margin:auto;padding:calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 92px)}
.top{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;margin-bottom:14px}.mark{display:grid;place-items:center;width:56px;height:56px;border:1px solid rgba(232,189,88,.45);border-radius:19px;background:linear-gradient(145deg,#161b29,#0c0f17);color:var(--gold2);font-size:25px;font-weight:1000;box-shadow:0 14px 40px rgba(0,0,0,.28)}.brand h1{margin:0;font-size:30px;letter-spacing:-.04em}.brand p{margin:4px 0 0;color:var(--gold);font-size:10px;font-weight:900;letter-spacing:.13em}.clock{text-align:right}.clock strong{display:block;font-size:19px}.clock span{display:block;margin-top:3px;color:var(--muted);font-size:10px}
.hero{position:relative;overflow:hidden;border:1px solid rgba(232,189,88,.34);border-radius:28px;padding:20px;margin-bottom:12px;background:linear-gradient(145deg,rgba(232,189,88,.12),rgba(17,21,33,.97) 62%);box-shadow:0 20px 60px rgba(0,0,0,.25)}.hero:after{content:"";position:absolute;right:-34px;bottom:-46px;width:150px;height:150px;border-radius:50%;border:1px solid rgba(232,189,88,.18)}.eyebrow{color:var(--gold);font-size:11px;font-weight:900}.hero h2{position:relative;z-index:1;margin:7px 0 6px;font-size:28px;line-height:1.25}.hero p{position:relative;z-index:1;margin:0;color:var(--muted);font-size:12px;line-height:1.6;max-width:86%}
.trinity{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}.card{position:relative;overflow:hidden;display:block;min-height:152px;padding:17px;border:1px solid var(--line);border-radius:24px;background:var(--panel);color:inherit;text-decoration:none}.card:active{transform:scale(.985)}.card .icon{font-size:27px}.card b{display:block;margin-top:12px;font-size:22px}.card small{display:block;margin-top:5px;color:var(--muted);font-size:11px;line-height:1.5}.card .arrow{position:absolute;right:16px;top:15px;color:var(--muted);font-size:22px}.taxi{background:linear-gradient(145deg,#17140e,#111521 66%);border-color:rgba(232,189,88,.22)}.taxi b{color:var(--gold2)}.life{background:linear-gradient(145deg,#251711,#111521 66%);border-color:rgba(255,138,118,.22)}.life b{color:#ffb09f}.yos-card{grid-column:1/-1;min-height:138px;background:linear-gradient(145deg,rgba(121,167,255,.15),rgba(17,21,33,.98) 62%);border-color:rgba(121,167,255,.28)}.yos-card b{color:#bfd2ff}
.panel{border:1px solid var(--line);border-radius:24px;padding:15px;background:rgba(17,21,33,.96);margin-bottom:12px}.panel-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:11px}.panel h3{margin:0;font-size:17px}.panel-head span{color:var(--muted);font-size:10px}.quick{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.quick button{min-height:58px;border:1px solid var(--line);border-radius:16px;background:var(--panel2);color:var(--text);font-weight:900;text-align:left;padding:11px}.quick button small{display:block;margin-top:4px;color:var(--muted);font-size:9px;font-weight:600}.settings{display:grid;grid-template-columns:1fr auto;gap:8px}.settings input{min-width:0;min-height:46px;border:1px solid var(--line);border-radius:14px;padding:0 12px;background:var(--panel2);color:var(--text);outline:none}.settings button{min-width:74px;border:0;border-radius:14px;background:linear-gradient(145deg,var(--gold2),#d79a24);color:#181006;font-weight:1000}.status{margin-top:8px;color:var(--muted);font-size:10px}.footer{text-align:center;color:var(--muted);font-size:10px;padding-top:3px}
.bottom{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 8px);transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,1fr);width:min(calc(100% - 22px),700px);padding:7px;border:1px solid rgba(255,255,255,.09);border-radius:23px;background:rgba(10,12,18,.88);backdrop-filter:blur(18px);box-shadow:0 14px 40px rgba(0,0,0,.35);z-index:10}.bottom a{display:flex;align-items:center;justify-content:center;min-height:49px;border-radius:16px;color:var(--muted);text-decoration:none;font-size:11px;font-weight:900}.bottom a.active{background:rgba(232,189,88,.14);color:var(--gold2)}
@media(max-width:370px){.top{grid-template-columns:50px 1fr auto}.mark{width:50px;height:50px}.brand h1{font-size:26px}.hero h2{font-size:24px}.card b{font-size:19px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="mark">Y</div><div class="brand"><h1>YOS</h1><p>YOUR ONLY SYSTEM</p></div><div class="clock"><strong id="clock">--:--</strong><span id="date">----</span></div></header>
<section class="hero"><div class="eyebrow">人生の司令塔</div><h2 id="greeting">今の自分から、次の一手を決める。</h2><p>仕事・生活・お金・感情を切り離さず、人生全体で判断する。</p></section>
<section class="trinity">
<a class="card yos-card" href="#consult"><span class="icon">🧠</span><span class="arrow">›</span><b>YOS</b><small>迷い・違和感・選択を、人生全体から判断する。</small></a>
<a class="card taxi" href="../taxi/"><span class="icon">🚖</span><span class="arrow">›</span><b>Taxi</b><small>働く・稼ぐ・記録する。</small></a>
<a class="card life" href="../life/"><span class="icon">🏠</span><span class="arrow">›</span><b>Life</b><small>暮らす・整える・守る。</small></a>
</section>
<section class="panel" id="consult"><div class="panel-head"><h3>すぐ相談する</h3><span>1タップで準備</span></div><div class="quick">
<button data-prompt="【今日の予定】今日の予定と優先順位を一緒に整理して。">📅 今日の予定<small>一日の流れを決める</small></button>
<button data-prompt="【人生相談】今の悩みを、仕事・健康・お金・人間関係・自分らしさを含めて一緒に考えて。">❤️ 人生相談<small>人生全体から考える</small></button>
<button data-prompt="【アイデア】今から話すアイデアを整理して、既存資産を活かす形に設計して。">💡 アイデア<small>思いつきを形にする</small></button>
<button data-prompt="【YOS改善】今のYOS運用を確認して、操作を減らし長く使える改善案を考えて。">⚙️ YOS改善<small>仕組みを育てる</small></button>
</div></section>
<section class="panel"><div class="panel-head"><h3>YOSチャット設定</h3><span>最初だけ</span></div><div class="settings"><input id="yosUrl" type="url" placeholder="https://chatgpt.com/..." inputmode="url"><button id="saveUrl">保存</button></div><div id="status" class="status">Taxi・Lifeと同じYOSチャットURLを使います。</div></section>
<footer class="footer">三つの力が、一つの人生をつくる。</footer>
</main>
<nav class="bottom"><a class="active" href="./">YOS</a><a href="../taxi/">Taxi</a><a href="../life/">Life</a></nav>
<script>
'use strict';
(()=>{
const KEY='yos-home-settings-v1',TAXI='yos-taxi-settings-v2';
const $=id=>document.getElementById(id);
const read=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||f}catch{return f}};
const write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let settings=read(KEY,{});
function sharedUrl(){try{return settings.yosUrl||read(TAXI,{}).yosUrl||''}catch{return settings.yosUrl||''}}
function paintClock(){const n=new Date(),h=Number(new Intl.DateTimeFormat('en-US',{hour:'2-digit',hour12:false,timeZone:'Asia/Tokyo'}).format(n));$('clock').textContent=new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Tokyo'}).format(n);$('date').textContent=new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric',weekday:'short',timeZone:'Asia/Tokyo'}).format(n);$('greeting').textContent=h<11?'おはよう。今日の人生を整えよう。':h<18?'今の状況から、次の一手を決めよう。':'今日を振り返り、明日へつなげよう。'}
$('yosUrl').value=sharedUrl();
$('saveUrl').onclick=()=>{const url=$('yosUrl').value.trim();settings.yosUrl=url;write(KEY,settings);const taxi=read(TAXI,{});taxi.yosUrl=url;write(TAXI,taxi);$('status').textContent=url?'保存しました。YOS・Taxi・Lifeで共通利用します。':'URLを消しました。'};
document.querySelectorAll('[data-prompt]').forEach(button=>button.onclick=async()=>{const text=button.dataset.prompt;try{await navigator.clipboard.writeText(text)}catch{prompt('この文章をコピーしてください',text);return}const url=sharedUrl();if(url.startsWith('https://chatgpt.com/'))location.href=url;else{$('status').textContent='相談文をコピーしました。先にYOSチャットURLを保存してください。';$('yosUrl').focus()}});
paintClock();setInterval(paintClock,30000);if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');
})();
</script>
</body>
</html>
