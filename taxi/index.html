<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YOS Taxi">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>YOS Taxi Operations</title>
  <style>
    :root{color-scheme:dark;--bg:#09090b;--panel:#151517;--line:#2a2a30;--text:#fafafa;--muted:#aaaab4;--amber:#ffb323;--orange:#ff7a00;--green:#48d17d;--red:#ff5c67;--blue:#74a7ff}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 100% 0,rgba(255,179,35,.15),transparent 34%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{touch-action:manipulation}.app{width:min(100%,760px);margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 28px)}
    .top{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.eyebrow{margin:0 0 4px;color:var(--amber);font-size:11px;font-weight:900;letter-spacing:.14em}.top h1{margin:0;font-size:28px;line-height:1.08}.clock{text-align:right;color:var(--muted);font-size:12px}.clock strong{display:block;color:var(--text);font-size:18px}
    .status{border:1px solid rgba(255,179,35,.32);border-radius:26px;padding:18px;margin-bottom:12px;background:linear-gradient(145deg,rgba(255,150,0,.19),rgba(21,21,23,.97) 62%)}.status-row{display:flex;justify-content:space-between;gap:12px}.status-label{color:#ffd990;font-size:12px;font-weight:900}.status h2{margin:4px 0 5px;font-size:26px}.status p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.badge{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;height:max-content;background:rgba(0,0,0,.22);font-size:12px;font-weight:800}.dot{width:8px;height:8px;border-radius:50%;background:var(--amber)}
    .kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-bottom:12px}.kpi{border:1px solid var(--line);border-radius:19px;padding:14px;background:rgba(21,21,23,.95)}.kpi strong{display:block;font-size:23px;line-height:1;margin-bottom:5px}.kpi span{color:var(--muted);font-size:11px}
    .actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}.action{min-height:68px;border:1px solid var(--line);border-radius:19px;padding:12px;background:var(--panel);color:var(--text);font-weight:900;font-size:16px}.action.primary{background:linear-gradient(145deg,var(--amber),var(--orange));color:#17100a;border:0}.action.green{background:rgba(72,209,125,.13);border-color:rgba(72,209,125,.38)}.action.red{background:rgba(255,92,103,.11);border-color:rgba(255,92,103,.34)}.action:disabled{opacity:.34}.action:active{transform:scale(.98)}
    .panel{border:1px solid var(--line);border-radius:22px;padding:15px;background:rgba(21,21,23,.95);margin-bottom:12px}.panel-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}.panel h3{margin:0;font-size:16px}.small{color:var(--muted);font-size:11px}.log{display:grid;gap:8px;max-height:315px;overflow:auto}.log-item{border:1px solid var(--line);border-radius:15px;padding:11px;background:#1d1d21}.log-item b{font-size:13px}.log-item p{margin:4px 0 0;color:var(--muted);font-size:11px;line-height:1.5}.empty{padding:18px;text-align:center;color:var(--muted);font-size:12px}.links{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.link,.minor{display:flex;align-items:center;justify-content:center;min-height:46px;border:1px solid var(--line);border-radius:14px;background:#1d1d21;color:var(--text);text-decoration:none;font-weight:800;font-size:13px}.danger-link{background:transparent;border:0;color:#ff9ca3;font-size:11px;padding:12px}.footer{padding:8px 2px;color:var(--muted);text-align:center;font-size:10px}
    dialog{width:min(calc(100% - 24px),620px);max-height:88vh;border:1px solid var(--line);border-radius:24px;padding:0;background:#111114;color:var(--text)}dialog::backdrop{background:rgba(0,0,0,.72);backdrop-filter:blur(5px)}.dialog-body{padding:18px}.dialog-body h3{margin:0 0 14px}.fields{display:grid;gap:11px}.field{display:grid;gap:6px}.field label{color:var(--muted);font-size:12px;font-weight:700}.field input,.field select,.field textarea{width:100%;min-height:47px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#1c1c20;color:var(--text);outline:none}.field textarea{min-height:84px}.row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.dialog-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:9px;margin-top:14px}.dialog-actions button{min-height:48px;border:1px solid var(--line);border-radius:14px;background:#1d1d21;color:var(--text);font-weight:900}.dialog-actions .confirm{background:linear-gradient(145deg,var(--amber),var(--orange));border:0;color:#17100a}.notice{border-left:3px solid var(--amber);padding:8px 10px;margin:0 0 12px;border-radius:8px;background:rgba(255,179,35,.08);color:#ffe1a9;font-size:12px;line-height:1.5}
    @media(min-width:640px){.kpis{grid-template-columns:repeat(4,1fr)}.actions{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<main class="app">
  <header class="top"><div><p class="eyebrow">YOS TAXI OPERATIONS</p><h1>🚖 営業コントロール</h1></div><div class="clock"><strong id="clockTime">--:--</strong><span id="clockDate">----</span></div></header>
  <section class="status" aria-live="polite"><div class="status-row"><div><div class="status-label">現在の状態</div><h2 id="statusTitle">営業前</h2><p id="statusDetail">安全確認をして営業を開始します。</p></div><span class="badge"><span class="dot" id="statusDot"></span><span id="statusBadge">準備</span></span></div></section>
  <section class="kpis"><div class="kpi"><strong id="salesKpi">¥0</strong><span>売上</span></div><div class="kpi"><strong id="ridesKpi">0</strong><span>乗車回数</span></div><div class="kpi"><strong id="avgKpi">¥0</strong><span>平均単価</span></div><div class="kpi"><strong id="hourlyKpi">¥0</strong><span>営業時給</span></div></section>
  <section class="actions"><button id="shiftButton" class="action primary">営業開始</button><button id="rideButton" class="action green">乗車</button><button id="dropoffButton" class="action primary">降車</button><button id="breakButton" class="action">休憩開始</button><button id="memoButton" class="action">メモ</button><button id="shareButton" class="action">YOSへ共有</button><button id="settingsButton" class="action">設定</button><button id="endButton" class="action red">営業終了</button></section>
  <section class="panel"><div class="panel-head"><h3>今日の記録</h3><span id="eventCount" class="small">0件</span></div><div id="logList" class="log"></div></section>
  <section class="panel"><div class="panel-head"><h3>データと司令室</h3><span class="small">既存資産を使用</span></div><div class="links"><a class="link" href="./calendar.html">営業カレンダー</a><a class="link" target="_blank" rel="noopener" href="https://docs.google.com/spreadsheets/d/1-Fszb0ksSDX-3xKiZBN1yV710QJtKCBfpAqdE04Mw5k/edit">ProjectY運行データ</a><a class="link" href="../">Mission Control</a><button id="csvButton" class="minor">CSV保存</button><button id="backupButton" class="minor">JSONバックアップ</button></div></section>
  <button id="resetButton" class="danger-link">不具合時のみ：本日の状態を初期化</button><footer class="footer">端末内へ自動保存・オフライン対応・運転中の操作禁止</footer>
</main>
<dialog id="rideDialog"><form method="dialog" class="dialog-body"><h3>乗車を記録</h3><p class="notice">必ず安全な場所へ停車して操作してください。</p><div class="fields"><div class="field"><label for="pickup">乗車地</label><input id="pickup" placeholder="例：松山1丁目"></div><div class="field"><label for="dispatch">配車</label><select id="dispatch"><option>流し</option><option>GO</option><option>DiDi</option><option>Uber</option><option>付け待ち</option><option>その他</option></select></div><div class="field"><label for="rideMemo">メモ</label><input id="rideMemo"></div></div><div class="dialog-actions"><button value="cancel">取消</button><button id="confirmRide" class="confirm" value="default">乗車開始</button></div></form></dialog>
<dialog id="dropoffDialog"><form method="dialog" class="dialog-body"><h3>降車を記録</h3><div class="fields"><div class="field"><label for="dropoff">降車地</label><input id="dropoff" placeholder="例：那覇空港"></div><div class="row2"><div class="field"><label for="fare">運賃（円）</label><input id="fare" type="number" min="0" step="100" inputmode="numeric" required></div><div class="field"><label for="payment">支払方法</label><select id="payment"><option>現金</option><option>クレジット</option><option>チケット</option><option>障害者割</option><option>Uber</option><option>未収</option><option>その他</option></select></div></div><div class="row2"><div class="field"><label for="distance">実車距離 km</label><input id="distance" type="number" min="0" step="0.1" inputmode="decimal"></div><div class="field"><label for="tip">チップ</label><input id="tip" type="number" min="0" step="100" inputmode="numeric"></div></div><div class="field"><label for="dropMemo">メモ</label><textarea id="dropMemo"></textarea></div></div><div class="dialog-actions"><button value="cancel">取消</button><button id="confirmDropoff" class="confirm" value="default">降車完了</button></div></form></dialog>
<dialog id="memoDialog"><form method="dialog" class="dialog-body"><h3>営業メモ</h3><div class="field"><label for="memoText">内容</label><textarea id="memoText" required></textarea></div><div class="dialog-actions"><button value="cancel">取消</button><button id="confirmMemo" class="confirm" value="default">記録</button></div></form></dialog>
<dialog id="settingsDialog"><form method="dialog" class="dialog-body"><h3>営業設定</h3><p class="notice">車両番号は当日の車両を入力。目標金額は営業前にYOSが算出した金額を入力します。</p><div class="fields"><div class="row2"><div class="field"><label for="targetSales">今日の目標（YOS提示額）</label><input id="targetSales" type="number" min="1" step="1" inputmode="numeric" placeholder="例：36500"></div><div class="field"><label for="vehicle">今日の車両番号</label><input id="vehicle" inputmode="numeric" placeholder="例：521"></div></div><div class="row2"><div class="field"><label for="plannedStart">営業開始</label><input id="plannedStart" type="time"></div><div class="field"><label for="plannedEnd">営業終了</label><input id="plannedEnd" type="time"></div></div><div class="field"><label for="areas">営業エリア</label><input id="areas"></div></div><div class="dialog-actions"><button value="cancel">取消</button><button id="saveSettings" class="confirm" value="default">保存</button></div></form></dialog>
<script>
'use strict';
const $=id=>document.getElementById(id),STORE='yos-taxi-ops-v1',SETTINGS='yos-taxi-settings-v2';
const DEFAULT={targetSales:0,vehicle:'',plannedStart:'17:30',plannedEnd:'03:30',areas:'那覇・浦添・宜野湾・豊見城・北谷'};
const META={before:['営業前','準備','安全確認をして営業を開始します。','#ffb323'],available:['空車・待機','営業中','乗車または配車を待っています。','#48d17d'],occupied:['乗車中','実車','安全運転を最優先。降車後に記録します。','#74a7ff'],break:['休憩中','休憩','休憩時間を自動計測しています。','#ffb323'],ended:['営業終了','終了','本日の記録をYOSへ共有してください。','#a2a2ad']};
const now=()=>new Date().toISOString(),money=n=>new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY',maximumFractionDigits:0}).format(Number(n||0)),time=i=>i?new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(new Date(i)):'',dur=(a,b=now())=>a?Math.max(0,new Date(b)-new Date(a)):0,label=ms=>`${Math.floor(ms/3600000)}時間${Math.floor((ms%3600000)/60000)}分`;
function day(){const d=new Date();if(d.getHours()<8)d.setDate(d.getDate()-1);return new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).format(d).replaceAll('/','-')}
function blank(){return{businessDate:day(),status:'before',shiftStart:null,shiftEnd:null,activeRide:null,breakStart:null,events:[],updatedAt:now()}}
function read(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}
let state=read(STORE,blank()),settings={...DEFAULT,...read(SETTINGS,{})};if(state.businessDate!==day())state=blank();
function save(){state.updatedAt=now();localStorage.setItem(STORE,JSON.stringify(state));render()}
function add(type,data={}){state.events.unshift({id:crypto.randomUUID?.()||String(Date.now()),type,at:now(),status:state.status,...data})}
const rides=()=>state.events.filter(e=>e.type==='降車'),sales=()=>rides().reduce((s,e)=>s+Number(e.fare||0)+Number(e.tip||0),0),work=()=>state.shiftStart?dur(state.shiftStart,state.shiftEnd||now()):0;
function breaks(){return state.events.filter(e=>e.type==='休憩終了').reduce((s,e)=>s+Number(e.durationMs||0),0)+(state.status==='break'?dur(state.breakStart):0)}
function hourly(){const h=Math.max((work()-breaks())/3600000,0);return h?sales()/h:0}
function esc(v=''){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function desc(e){if(e.type==='降車')return`${e.pickup||'不明'} → ${e.dropoff||'不明'} / ${money(Number(e.fare||0)+Number(e.tip||0))} / ${e.payment||''} / ${e.dispatch||''}`;if(e.type==='乗車')return`${e.pickup||'場所未入力'} / ${e.dispatch||''}`;if(e.type==='休憩終了')return label(e.durationMs||0);return e.memo||''}
function render(){const m=META[state.status]||META.before;$('statusTitle').textContent=m[0];$('statusBadge').textContent=m[1];$('statusDetail').textContent=m[2];$('statusDot').style.background=m[3];$('salesKpi').textContent=money(sales());$('ridesKpi').textContent=rides().length;$('avgKpi').textContent=money(rides().length?sales()/rides().length:0);$('hourlyKpi').textContent=money(hourly());$('shiftButton').disabled=state.status!=='before';$('shiftButton').textContent=state.status==='before'?'営業開始':'営業中';$('rideButton').disabled=state.status!=='available';$('dropoffButton').disabled=state.status!=='occupied';$('breakButton').disabled=!['available','break'].includes(state.status);$('breakButton').textContent=state.status==='break'?'休憩終了':'休憩開始';$('endButton').disabled=['before','occupied','break','ended'].includes(state.status);$('eventCount').textContent=`${state.events.length}件`;$('logList').innerHTML=state.events.length?state.events.slice(0,30).map(e=>`<article class="log-item"><b>${esc(e.type)} ・ ${time(e.at)}</b><p>${esc(desc(e))}</p></article>`).join(''):'<div class="empty">まだ記録はありません</div>'}
function tick(){const d=new Date();$('clockTime').textContent=new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit'}).format(d);$('clockDate').textContent=new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric',weekday:'short'}).format(d);if(state.shiftStart&&state.status!=='ended')render()}setInterval(tick,30000);tick();
function openSettings(){ $('targetSales').value=settings.targetSales||'';$('vehicle').value=settings.vehicle;$('plannedStart').value=settings.plannedStart;$('plannedEnd').value=settings.plannedEnd;$('areas').value=settings.areas;$('settingsDialog').showModal() }
$('shiftButton').onclick=()=>{if(!settings.vehicle||Number(settings.targetSales)<=0){alert('営業開始前に、当日の車両番号とYOS提示の目標金額を設定してください。');openSettings();return}if(!confirm(`安全確認後に営業を開始します。\n車両：${settings.vehicle}\n目標：${money(settings.targetSales)}`))return;state.shiftStart=now();state.status='available';add('営業開始',{memo:`車両${settings.vehicle}・目標${settings.targetSales}円`});save()};
$('rideButton').onclick=()=>{$('pickup').value='';$('rideMemo').value='';$('rideDialog').showModal()};$('confirmRide').onclick=()=>{state.activeRide={start:now(),pickup:$('pickup').value.trim(),dispatch:$('dispatch').value,memo:$('rideMemo').value.trim()};state.status='occupied';add('乗車',state.activeRide);save()};
$('dropoffButton').onclick=()=>{['dropoff','fare','distance','tip','dropMemo'].forEach(id=>$(id).value='');$('dropoffDialog').showModal()};$('confirmDropoff').onclick=e=>{const fare=Number($('fare').value||0);if(!Number.isFinite(fare)||fare<0){e.preventDefault();alert('運賃を確認してください');return}const r=state.activeRide||{},end=now();add('降車',{start:r.start,end,pickup:r.pickup,dropoff:$('dropoff').value.trim(),dispatch:r.dispatch,fare,payment:$('payment').value,distance:Number($('distance').value||0),tip:Number($('tip').value||0),durationMs:dur(r.start,end),memo:$('dropMemo').value.trim()||r.memo||''});state.activeRide=null;state.status='available';save()};
$('breakButton').onclick=()=>{if(state.status==='available'){state.breakStart=now();state.status='break';add('休憩開始')}else{const end=now();add('休憩終了',{start:state.breakStart,end,durationMs:dur(state.breakStart,end)});state.breakStart=null;state.status='available'}save()};
$('memoButton').onclick=()=>{$('memoText').value='';$('memoDialog').showModal()};$('confirmMemo').onclick=()=>{const memo=$('memoText').value.trim();if(memo){add('メモ',{memo});save()}};
function summary(){return[`【YOS Taxi 営業報告】`,`営業日：${state.businessDate}`,`車両：${settings.vehicle}`,`状態：${META[state.status]?.[0]||state.status}`,`営業開始：${time(state.shiftStart)||'未記録'}`,`営業終了：${time(state.shiftEnd)||'営業中'}`,`売上：${sales()}円`,`乗車回数：${rides().length}回`,`平均単価：${Math.round(rides().length?sales()/rides().length:0)}円`,`営業時間：${label(work())}`,`休憩時間：${label(breaks())}`,`営業時給：${Math.round(hourly())}円`,`今日の目標：${settings.targetSales}円`,`目標差：${sales()-settings.targetSales}円`].join('\n')}
async function share(){const text=summary();if(navigator.share){try{await navigator.share({title:'YOS Taxi 営業報告',text});return}catch{}}try{await navigator.clipboard.writeText(text);alert('営業報告をコピーしました')}catch{prompt('営業報告をコピーしてください',text)}}$('shareButton').onclick=share;
$('endButton').onclick=()=>{if(!confirm(`営業を終了します。\n売上：${money(sales())}\n乗車：${rides().length}回`))return;state.shiftEnd=now();state.status='ended';add('営業終了',{memo:`売上${sales()}円・${rides().length}回`});save();share()};
$('settingsButton').onclick=openSettings;$('saveSettings').onclick=e=>{const targetSales=Number($('targetSales').value||0),vehicle=$('vehicle').value.trim();if(targetSales<=0||!vehicle){e.preventDefault();alert('車両番号とYOS提示の目標金額を入力してください。');return}settings={targetSales,vehicle,plannedStart:$('plannedStart').value,plannedEnd:$('plannedEnd').value,areas:$('areas').value.trim()};localStorage.setItem(SETTINGS,JSON.stringify(settings));render()};
function dl(name,content,type){const b=new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}function q(v){const s=String(v??'');return/[",\n]/.test(s)?`"${s.replaceAll('"','""')}"`:s}
$('csvButton').onclick=()=>{const h=['記録日時','営業日','種別','開始時刻','終了時刻','乗車地','降車地','売上','支払方法','配車アプリ','実車距離','空車時間','休憩時間','メモ','営業状態'],rows=[...state.events].reverse().map(e=>[e.at,state.businessDate,e.type,e.start||e.at,e.end||'',e.pickup||'',e.dropoff||'',e.fare||'',e.payment||'',e.dispatch||'',e.distance||'','',e.type==='休憩終了'?Math.round((e.durationMs||0)/60000):'',e.memo||'',e.status||state.status]);dl(`yos-taxi-${state.businessDate}.csv`,[h,...rows].map(r=>r.map(q).join(',')).join('\n'),'text/csv;charset=utf-8')};$('backupButton').onclick=()=>dl(`yos-taxi-${state.businessDate}.json`,JSON.stringify({state,settings},null,2),'application/json');$('resetButton').onclick=()=>{if(confirm('本日の端末内データを初期化します。バックアップ済みですか？')){state=blank();save()}};
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));render();
</script>
</body>
</html>
