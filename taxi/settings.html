<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<title>YOS Taxi 設定</title>
<style>
:root{color-scheme:dark;--bg:#09090b;--panel:#151517;--panel2:#1d1d21;--line:#2a2a30;--text:#fafafa;--muted:#a6a6b0;--amber:#ffb323;--green:#4bd283}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 0 0,rgba(255,179,35,.14),transparent 32%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}.app{width:min(100%,720px);margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 88px)}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.eyebrow{margin:0 0 4px;color:var(--amber);font-size:11px;font-weight:900;letter-spacing:.13em}h1{margin:0;font-size:28px}.back{display:flex;align-items:center;min-height:44px;padding:0 13px;border:1px solid var(--line);border-radius:14px;background:var(--panel);color:var(--text);text-decoration:none;font-weight:900}.notice,.status{border:1px solid rgba(255,179,35,.3);border-radius:20px;padding:14px;background:rgba(255,179,35,.08);margin-bottom:12px}.notice b,.status b{display:block;color:#ffd58a;margin-bottom:5px}.notice p,.status p{margin:0;color:var(--muted);font-size:12px;line-height:1.55}.panel{border:1px solid var(--line);border-radius:22px;padding:15px;background:var(--panel);margin-bottom:12px}.panel h2{margin:0 0 12px;font-size:18px}.fields{display:grid;gap:10px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:grid;gap:5px}.field label{font-size:11px;color:var(--muted);font-weight:800}.field input,.field select{width:100%;min-height:47px;border:1px solid var(--line);border-radius:14px;padding:9px 11px;background:var(--panel2);color:var(--text)}.field small{color:var(--muted);font-size:10px;line-height:1.4}.actions{display:grid;gap:8px;margin-top:12px}.actions.two{grid-template-columns:1fr 1fr}.actions button{min-height:50px;border:1px solid var(--line);border-radius:15px;background:var(--panel2);color:var(--text);font-weight:900}.actions .primary{border:0;background:linear-gradient(145deg,var(--amber),#ff7a00);color:#17100a}.actions .green{border-color:rgba(75,210,131,.35);background:rgba(75,210,131,.1)}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.metric{border:1px solid var(--line);border-radius:16px;padding:11px;background:var(--panel2)}.metric strong{display:block;font-size:17px}.metric span{font-size:10px;color:var(--muted)}@media(max-width:390px){.row2{grid-template-columns:1fr}.actions.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><p class="eyebrow">YOS TAXI OPERATIONS</p><h1>⚙️ 営業カレンダー設定</h1></div><a class="back" href="./">営業画面</a></header>
<section class="notice"><b>アプリ内だけで完結できます</b><p>外部カレンダーを使わなくても、月目標・売上・勤務周期・勤務時間・目標配分をここで設定できます。</p></section>
<section class="status"><b id="statusTitle">現在の状態</b><p id="statusText">読み込み中</p></section>
<section class="panel"><h2>月と売上</h2><div class="fields">
<div class="field"><label>設定する月</label><input id="month" type="month"></div>
<div class="row2"><div class="field"><label>月目標（税込）</label><input id="goal" type="number" min="0" step="1000" inputmode="numeric"></div><div class="field"><label>過去分の達成売上</label><input id="carrySales" type="number" min="0" step="100" inputmode="numeric"><small>このカレンダーへ未入力の売上だけを入れます。</small></div></div>
</div></section>
<section class="panel"><h2>勤務予定</h2><div class="fields">
<div class="row2"><div class="field"><label>標準の営業開始</label><input id="start" type="time"></div><div class="field"><label>標準の営業終了</label><input id="end" type="time"></div></div>
<div class="row2"><div class="field"><label>連続勤務日数</label><input id="workDays" type="number" min="1" max="14" step="1" inputmode="numeric"></div><div class="field"><label>連続公休日数</label><input id="offDays" type="number" min="1" max="14" step="1" inputmode="numeric"></div></div>
<div class="field"><label>周期の最初の勤務日</label><input id="anchor" type="date"><small>この日を勤務1日目として「3勤1休」などの周期を自動作成します。</small></div>
</div><div class="actions"><button id="generate" class="green">この月の勤務・公休を自動設定</button></div></section>
<section class="panel"><h2>目標配分</h2><div class="fields"><div class="row2"><div class="field"><label>標準の期待値補正</label><select id="factor"><option value="0.8">低い ×0.8</option><option value="0.9">やや低い ×0.9</option><option value="1" selected>通常 ×1.0</option><option value="1.1">やや高い ×1.1</option><option value="1.2">高い ×1.2</option><option value="1.3">非常に高い ×1.3</option></select></div><div class="field"><label>目標の丸め単位</label><select id="round"><option value="100">100円</option><option value="500" selected>500円</option><option value="1000">1,000円</option></select></div></div></div>
<div class="actions two"><button id="importOps">今日の営業データを取込</button><button id="allocate" class="green">残り勤務日へ目標配分</button></div></section>
<section class="panel"><h2>設定結果</h2><div class="mini"><div class="metric"><strong id="workCount">0日</strong><span>勤務日</span></div><div class="metric"><strong id="offCount">0日</strong><span>公休日</span></div><div class="metric"><strong id="hoursTotal">0時間</strong><span>予定時間</span></div></div></section>
<div class="actions"><button id="save" class="primary">設定を保存</button><a class="back" style="justify-content:center" href="./calendar.html">営業カレンダーを確認</a></div>
</main>
<script>
'use strict';
const CAL='yos-taxi-calendar-v1',SET='yos-taxi-calendar-settings-v2',OPS='yos-taxi-ops-v1',TAXI='yos-taxi-settings-v2';
const $=id=>document.getElementById(id),read=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||f}catch{return f}},write=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const pad=n=>String(n).padStart(2,'0'),dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,monthKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}`,todayKey=()=>{const d=new Date();if(d.getHours()<8)d.setDate(d.getDate()-1);return dateKey(d)},fromMonth=m=>new Date(`${m}-01T12:00:00`),hours=(s,e)=>{const[a,b]=[s,e].map(x=>x.split(':').map(Number)).map(x=>x[0]*60+x[1]);return((b<=a?b+1440:b)-a)/60},diff=(a,b)=>Math.round((new Date(`${a}T12:00:00`)-new Date(`${b}T12:00:00`))/86400000);
let data=read(CAL,{monthlyGoals:{},days:{}}),settings={shiftStart:'17:30',shiftEnd:'03:30',workDays:3,offDays:1,anchor:todayKey(),carrySales:0,factor:1,round:500,...read(SET,{})};
$('month').value=monthKey(new Date());$('start').value=settings.shiftStart;$('end').value=settings.shiftEnd;$('workDays').value=settings.workDays;$('offDays').value=settings.offDays;$('anchor').value=settings.anchor;$('carrySales').value=settings.carrySales||'';$('factor').value=String(settings.factor||1);$('round').value=String(settings.round||500);
function selectedMonth(){return $('month').value||monthKey(new Date())}function currentGoal(){return Number(data.monthlyGoals[selectedMonth()]||770000)}
function loadMonth(){ $('goal').value=currentGoal();renderStats()}$('month').onchange=loadMonth;
function syncSettings(){settings={...settings,shiftStart:$('start').value||'17:30',shiftEnd:$('end').value||'03:30',workDays:Math.max(1,Number($('workDays').value||3)),offDays:Math.max(1,Number($('offDays').value||1)),anchor:$('anchor').value||todayKey(),carrySales:Number($('carrySales').value||0),factor:Number($('factor').value||1),round:Number($('round').value||500)};data.monthlyGoals[selectedMonth()]=Number($('goal').value||0);write(SET,settings);write(CAL,data);const taxi={...read(TAXI,{}),plannedStart:settings.shiftStart,plannedEnd:settings.shiftEnd};write(TAXI,taxi)}
function renderStats(){const mk=selectedMonth(),entries=Object.entries(data.days).filter(([k])=>k.startsWith(mk)),work=entries.filter(([,v])=>v.status==='work'),off=entries.filter(([,v])=>v.status==='off'),h=work.reduce((s,[,v])=>s+Number(v.hours||0),0);$('workCount').textContent=`${work.length}日`;$('offCount').textContent=`${off.length}日`;$('hoursTotal').textContent=`${h}時間`;const sales=entries.reduce((s,[,v])=>s+Number(v.sales||0),0)+Number(settings.carrySales||0);$('statusText').textContent=`月目標 ${currentGoal().toLocaleString()}円 / 記録済み売上 ${sales.toLocaleString()}円 / 勤務予定 ${work.length}日`}
$('generate').onclick=()=>{syncSettings();const base=fromMonth(selectedMonth()),days=new Date(base.getFullYear(),base.getMonth()+1,0).getDate(),cycle=settings.workDays+settings.offDays,h=hours(settings.shiftStart,settings.shiftEnd);for(let i=1;i<=days;i++){const d=new Date(base.getFullYear(),base.getMonth(),i),k=dateKey(d),pos=((diff(k,settings.anchor)%cycle)+cycle)%cycle,isWork=pos<settings.workDays,v=data.days[k]||{target:0,sales:0,weather:'未確認',event:''};data.days[k]={...v,status:isWork?'work':'off',hours:isWork?h:0,factor:Number(v.factor||settings.factor)};}write(CAL,data);renderStats();alert('勤務・公休を設定しました')};
$('importOps').onclick=()=>{const ops=read(OPS,null);if(!ops?.businessDate){alert('営業データがありません');return}const rides=(ops.events||[]).filter(e=>e.type==='降車'),sales=rides.reduce((s,e)=>s+Number(e.fare||0)+Number(e.tip||0),0),taxi=read(TAXI,{}),v=data.days[ops.businessDate]||{};data.days[ops.businessDate]={status:'work',hours:v.hours||hours(settings.shiftStart,settings.shiftEnd),target:Number(taxi.targetSales||v.target||0),sales,weather:v.weather||'未確認',factor:Number(v.factor||settings.factor),event:v.event||''};write(CAL,data);renderStats();alert(`今日の売上 ${sales.toLocaleString()}円を取り込みました`)};
function weekdayWeight(k){const w=new Date(`${k}T12:00:00`).getDay();return w===6?1.28:w===5?1.18:w===0?1.02:w===4?.98:.9}
$('allocate').onclick=()=>{syncSettings();const mk=selectedMonth(),today=todayKey(),entries=Object.entries(data.days).filter(([k,v])=>k.startsWith(mk)&&k>=today&&v.status==='work'),achieved=Object.entries(data.days).filter(([k])=>k.startsWith(mk)).reduce((s,[,v])=>s+Number(v.sales||0),Number(settings.carrySales||0)),remain=Math.max(0,currentGoal()-achieved);if(!entries.length){alert('勤務日を先に設定してください');return}const standard=Math.max(hours(settings.shiftStart,settings.shiftEnd),1),weighted=entries.map(([k,v])=>[k,weekdayWeight(k)*Math.max(.25,Number(v.hours||standard)/standard)*Number(v.factor||settings.factor)]),total=weighted.reduce((s,[,w])=>s+w,0),r=settings.round;weighted.forEach(([k,w])=>{data.days[k]={...data.days[k],target:Math.ceil((remain*w/total)/r)*r}});write(CAL,data);renderStats();alert('残り勤務日へ目標を配分しました')};
$('save').onclick=()=>{syncSettings();renderStats();alert('設定を保存しました')};loadMonth();
</script>
<script src="./swipe-nav.js"></script>
</body></html>
