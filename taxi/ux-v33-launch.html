<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>YOS Taxi テスト版を起動</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#09090b;color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;-webkit-font-smoothing:antialiased}body{display:grid;place-items:center;padding:24px}.card{width:min(100%,420px);border:1px solid #2a2a30;border-radius:28px;padding:24px;background:#151517;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35)}.icon{font-size:48px}.title{font-size:24px;font-weight:800;margin:12px 0 8px}.status{color:#aaaab4;font-size:14px;line-height:1.6;margin:0}.retry{display:none;width:100%;min-height:52px;margin-top:18px;border:0;border-radius:16px;background:linear-gradient(145deg,#ffb323,#ff7a00);color:#17100a;font:inherit;font-weight:900}
</style>
</head>
<body>
<main class="card">
<div class="icon">🚖</div>
<div class="title">テスト版を準備中</div>
<p id="status" class="status">数秒で自動的に開きます。</p>
<button id="retry" class="retry" type="button">もう一度開く</button>
</main>
<script>
'use strict';
const statusEl=document.getElementById('status');
const retry=document.getElementById('retry');
const target='./index.html?ux=33&v=33';
let moved=false;
function openTest(){if(moved)return;moved=true;location.replace(target)}
async function start(){
  if(!('serviceWorker' in navigator)){statusEl.textContent='このブラウザでは起動できません。Safariで開いてください。';retry.style.display='block';retry.onclick=()=>location.href=target;return}
  try{
    await navigator.serviceWorker.register('./service-worker.js',{scope:'./'});
    await navigator.serviceWorker.ready;
    if(navigator.serviceWorker.controller){openTest();return}
    navigator.serviceWorker.addEventListener('controllerchange',openTest,{once:true});
    setTimeout(()=>location.reload(),1200);
    setTimeout(()=>{statusEl.textContent='準備に時間がかかっています。下のボタンを押してください。';retry.style.display='block';retry.onclick=openTest},4500);
  }catch(error){
    statusEl.textContent='起動準備に失敗しました。Safariで開き直してください。';
    retry.style.display='block';
    retry.onclick=()=>location.href=target;
  }
}
start();
</script>
</body>
</html>
