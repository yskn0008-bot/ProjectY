<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b0b0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YOS通訳">
<link rel="manifest" href="./manifest.webmanifest">
<title>YOS Interpreter</title>
<style>
:root{color-scheme:dark;--bg:#09090b;--panel:#151517;--panel2:#1d1d21;--line:#2a2a30;--text:#fafafa;--muted:#aaaab4;--accent:#ffb323;--accent2:#ff7a00;--blue:#66a6ff;--green:#49d17d;--red:#ff6672}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;-webkit-font-smoothing:antialiased}body{min-height:100svh;background:radial-gradient(circle at 100% 0,rgba(255,179,35,.15),transparent 34%),var(--bg)}button,select,textarea{font:inherit}.app{width:min(100%,760px);min-height:100svh;margin:auto;padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 16px);display:grid;grid-template-rows:auto auto 1fr auto;gap:10px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand small{display:block;color:var(--accent);font-size:10px;font-weight:900;letter-spacing:.14em}.brand h1{margin:2px 0 0;font-size:24px;line-height:1}.status{font-size:11px;color:var(--muted);padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(21,21,23,.8)}.languages{display:grid;grid-template-columns:1fr 44px 1fr;gap:8px;align-items:center}.languages select{width:100%;min-height:46px;border:1px solid var(--line);border-radius:15px;padding:0 12px;background:var(--panel);color:var(--text);font-weight:800}.swap{height:44px;border:1px solid var(--line);border-radius:14px;background:var(--panel2);color:var(--text);font-size:20px}.stage{display:grid;grid-template-rows:1fr 1fr;gap:10px;min-height:0}.pane{position:relative;display:grid;grid-template-rows:auto 1fr auto;min-height:0;border:1px solid var(--line);border-radius:26px;padding:14px;background:rgba(21,21,23,.96);overflow:hidden}.pane.source{box-shadow:inset 0 0 0 1px rgba(102,166,255,.08)}.pane.target{box-shadow:inset 0 0 0 1px rgba(255,179,35,.08)}.pane-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.pane-head b{font-size:13px}.pane-head span{font-size:10px;color:var(--muted)}textarea{width:100%;height:100%;min-height:100px;resize:none;border:0;outline:0;background:transparent;color:var(--text);padding:14px 2px;font-size:clamp(22px,6vw,34px);font-weight:700;line-height:1.35}.target textarea{color:#fff4d5}.pane-actions{display:grid;grid-template-columns:1fr 56px;gap:8px}.talk,.speak{min-height:54px;border:0;border-radius:17px;font-weight:900}.talk{background:linear-gradient(145deg,var(--accent),var(--accent2));color:#17100a}.speak{background:var(--panel2);color:var(--text);border:1px solid var(--line);font-size:20px}.talk.listening{background:linear-gradient(145deg,#ff6672,#ff8a3d);animation:pulse 1.1s infinite}@keyframes pulse{50%{transform:scale(.985);filter:brightness(1.08)}}.bottom{display:grid;grid-template-columns:1fr 1fr;gap:8px}.bottom button{min-height:48px;border:1px solid var(--line);border-radius:15px;background:var(--panel2);color:var(--text);font-weight:800}.bottom .clear{color:#ff9ca3}.notice{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%) translateY(120px);width:min(calc(100% - 24px),520px);padding:13px 15px;border:1px solid var(--line);border-radius:16px;background:rgba(20,20,23,.96);color:var(--text);font-size:12px;line-height:1.5;box-shadow:0 16px 42px rgba(0,0,0,.35);transition:transform .28s ease;z-index:20}.notice.show{transform:translateX(-50%) translateY(0)}@media(min-height:760px){.stage{grid-template-rows:1fr 1fr}}@media(min-width:700px){.stage{grid-template-columns:1fr 1fr;grid-template-rows:1fr}.app{padding-left:18px;padding-right:18px}.pane{min-height:520px}}
</style>
</head>
<body>
<main class="app">
  <header class="top"><div class="brand"><small>YOS INTERPRETER</small><h1>通訳</h1></div><div id="status" class="status">準備完了</div></header>
  <section class="languages">
    <select id="sourceLang" aria-label="話す言語"><option value="ja-JP">日本語</option><option value="en-US">English</option><option value="zh-CN">中文</option><option value="ko-KR">한국어</option></select>
    <button id="swap" class="swap" type="button" aria-label="言語を入れ替える">⇄</button>
    <select id="targetLang" aria-label="翻訳先言語"><option value="en-US">English</option><option value="ja-JP">日本語</option><option value="zh-CN">中文</option><option value="ko-KR">한국어</option></select>
  </section>
  <section class="stage">
    <article class="pane source"><div class="pane-head"><b>話す</b><span>押して話す</span></div><textarea id="sourceText" placeholder="ここに音声が入ります"></textarea><div class="pane-actions"><button id="talk" class="talk" type="button">話す</button><button id="sourceSpeak" class="speak" type="button">🔊</button></div></article>
    <article class="pane target"><div class="pane-head"><b>相手に見せる</b><span>翻訳結果</span></div><textarea id="targetText" placeholder="翻訳結果" readonly></textarea><div class="pane-actions"><button id="translate" class="talk" type="button">翻訳</button><button id="targetSpeak" class="speak" type="button">🔊</button></div></article>
  </section>
  <footer class="bottom"><button id="copy" type="button">コピー</button><button id="clear" class="clear" type="button">消去</button></footer>
</main>
<div id="notice" class="notice"></div>
<script>
'use strict';
const $=id=>document.getElementById(id);
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null,listening=false;
const langName={'ja-JP':'日本語','en-US':'English','zh-CN':'中文','ko-KR':'한국어'};
function toast(message){const n=$('notice');n.textContent=message;n.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>n.classList.remove('show'),2400)}
function setStatus(text){$('status').textContent=text}
function speak(text,lang){if(!text.trim())return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=.94;u.pitch=1;window.speechSynthesis.speak(u)}
function stopRecognition(){if(recognition){try{recognition.stop()}catch{}}listening=false;$('talk').classList.remove('listening');$('talk').textContent='話す';setStatus('準備完了')}
function startRecognition(){if(!SpeechRecognition){toast('この環境では音声入力を使えません。Safariで開いてください。');return}if(listening){stopRecognition();return}recognition=new SpeechRecognition();recognition.lang=$('sourceLang').value;recognition.interimResults=true;recognition.continuous=false;recognition.maxAlternatives=1;recognition.onstart=()=>{listening=true;$('talk').classList.add('listening');$('talk').textContent='聞いています';setStatus('音声入力中')};recognition.onresult=e=>{let text='';for(let i=e.resultIndex;i<e.results.length;i++)text+=e.results[i][0].transcript;$('sourceText').value=text};recognition.onerror=e=>{toast('音声入力に失敗しました');setStatus(e.error||'エラー')};recognition.onend=()=>{listening=false;$('talk').classList.remove('listening');$('talk').textContent='話す';setStatus('入力完了')};recognition.start()}
function translate(){const text=$('sourceText').value.trim();if(!text){toast('先に話すか入力してください');return}const from=langName[$('sourceLang').value],to=langName[$('targetLang').value];$('targetText').value=`［翻訳エンジン接続待ち］\n${from} → ${to}\n\n${text}`;toast('UIと音声入出力は完成。翻訳エンジンは次工程で接続します。')}
$('talk').onclick=startRecognition;
$('translate').onclick=translate;
$('sourceSpeak').onclick=()=>speak($('sourceText').value,$('sourceLang').value);
$('targetSpeak').onclick=()=>speak($('targetText').value,$('targetLang').value);
$('swap').onclick=()=>{const a=$('sourceLang').value;$('sourceLang').value=$('targetLang').value;$('targetLang').value=a;const t=$('sourceText').value;$('sourceText').value=$('targetText').value;$('targetText').value=t};
$('copy').onclick=async()=>{const text=$('targetText').value.trim();if(!text)return;try{await navigator.clipboard.writeText(text);toast('コピーしました')}catch{toast('コピーできませんでした')}};
$('clear').onclick=()=>{$('sourceText').value='';$('targetText').value='';stopRecognition()};
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
