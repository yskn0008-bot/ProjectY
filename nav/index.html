<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<title>YOSナビ</title>
<style>
:root{color-scheme:dark;--bg:#09090b;--panel:#171719;--line:#2b2b30;--text:#fff;--muted:#aaaab3;--accent:#ff9a1f;--green:#42d17f;--blue:#6fa8ff;--yellow:#f4c84d;--red:#ff6d78}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}body{background:radial-gradient(circle at 100% 0,rgba(255,154,31,.16),transparent 34%),var(--bg)}button,input{font:inherit}.app{max-width:560px;margin:auto;padding:calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 22px)}h1{margin:0;font-size:26px}.sub{margin:5px 0 10px;color:var(--muted);font-size:12px}.app-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 14px}.app-links a{display:flex;align-items:center;justify-content:center;min-height:42px;border:1px solid var(--line);border-radius:13px;background:#1d1d21;color:var(--text);text-decoration:none;font-size:12px;font-weight:900}.app-links a:first-child{border-color:rgba(255,179,35,.36);color:#ffd990}.hero{border:1px solid rgba(66,209,127,.45);border-radius:22px;padding:15px;background:linear-gradient(145deg,rgba(66,209,127,.16),var(--panel) 64%)}.eyebrow{color:var(--green);font-size:11px;font-weight:950}.hero h2{margin:5px 0 2px;font-size:30px;line-height:1.05}.hero p{margin:0;color:var(--muted);font-size:12px}.go{width:100%;min-height:58px;margin-top:12px;border:0;border-radius:16px;background:linear-gradient(145deg,#ffb323,#ff7a00);color:#17100a;font-size:18px;font-weight:950}.grid{display:grid;gap:8px;margin-top:10px}.card{display:grid;grid-template-columns:12px minmax(0,1fr) auto;align-items:center;gap:10px;min-height:74px;padding:11px 12px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}.bar{width:8px;height:42px;border-radius:999px}.card b{display:block;font-size:17px}.card small{display:block;margin-top:3px;color:var(--muted);font-size:10px}.card button{min-height:38px;padding:0 10px;border:1px solid var(--line);border-radius:11px;background:#222226;color:var(--text);font-size:11px;font-weight:900}.green .bar{background:var(--green)}.blue .bar{background:var(--blue)}.yellow .bar{background:var(--yellow)}.red .bar{background:var(--red)}.timer{margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}.timer-head{display:flex;justify-content:space-between;align-items:center;gap:8px}.timer strong{font-size:28px}.timer span{color:var(--muted);font-size:11px}.timer-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}.timer-actions button{min-height:42px;border:1px solid var(--line);border-radius:12px;background:#222226;color:var(--text);font-weight:900}.manual{margin-top:12px;padding:13px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}label{display:block;margin-bottom:6px;color:var(--muted);font-size:11px;font-weight:900}input{width:100%;min-height:48px;border:1px solid var(--line);border-radius:13px;padding:0 12px;background:#222226;color:var(--text)}.manual button{width:100%;min-height:48px;margin-top:8px;border:0;border-radius:13px;background:#2b2b30;color:var(--text);font-weight:900}.note{margin:12px 2px 0;color:var(--muted);font-size:10px;line-height:1.5}.hidden{display:none!important}
</style>
</head>
<body>
<main class="app">
<h1>🧭 YOSナビ</h1>
<p class="sub">Taxiの営業判断を、色とナビに変える。</p>
<nav class="app-links" aria-label="Taxiアプリ内の移動"><a href="../taxi/">Taxi営業へ戻る</a><a href="../taxi/calendar.html">営業カレンダー</a></nav>
<section class="hero">
<div class="eyebrow">今の指示</div>
<h2 id="primaryName">久茂地</h2>
<p id="primaryAction">今すぐ向かう</p>
<button id="primaryGo" class="go">ここへ行く</button>
</section>
<section class="grid">
<article class="card blue"><i class="bar"></i><div><b id="nextName">松山</b><small id="nextAction">次の候補・到着後10分待機</small></div><button data-target="next">ナビ</button></article>
<article class="card yellow"><i class="bar"></i><div><b id="passName">若狭</b><small id="passAction">流しながら確認</small></div><button data-target="pass">ナビ</button></article>
<article class="card red"><i class="bar"></i><div><b id="avoidName">空港</b><small id="avoidAction">今は行かない</small></div><button data-target="avoid">避ける</button></article>
</section>
<section class="timer">
<div class="timer-head"><div><span>待機タイマー</span><strong id="timerText">10:00</strong></div><span id="timerStatus">未開始</span></div>
<div class="timer-actions"><button id="timerStart">開始</button><button id="timerReset">リセット</button></div>
</section>
<section class="manual">
<label for="destination">自由入力</label>
<input id="destination" type="search" autocomplete="off" enterkeyhint="go" placeholder="ホテル名・施設名・住所">
<button id="manualGo">Googleマップで案内</button>
</section>
<p class="note">運転中は操作しない。停車後に確認。Googleマップでは必要に応じて「開始」を押す。</p>
</main>
<script>
'use strict';
(()=>{
  const params=new URLSearchParams(location.search);
  const waitRaw=params.get('wait');
  const waitParam=waitRaw===null?NaN:Number(waitRaw);
  const waitMinutes=Number.isFinite(waitParam)?Math.max(1,Math.min(60,Math.round(waitParam))):10;
  const state={
    primary:params.get('primary')||'那覇市久茂地',
    primaryLabel:params.get('primaryLabel')||'久茂地',
    primaryAction:params.get('primaryAction')||'今すぐ向かう',
    next:params.get('next')||'那覇市松山',
    nextLabel:params.get('nextLabel')||'松山',
    nextAction:params.get('nextAction')||'次の候補・到着後10分待機',
    pass:params.get('pass')||'那覇市若狭',
    passLabel:params.get('passLabel')||'若狭',
    passAction:params.get('passAction')||'流しながら確認',
    avoid:params.get('avoid')||'那覇空港',
    avoidLabel:params.get('avoidLabel')||'空港',
    avoidAction:params.get('avoidAction')||'今は行かない',
    wait:waitMinutes
  };
  const $=id=>document.getElementById(id);
  $('primaryName').textContent=state.primaryLabel;$('primaryAction').textContent=state.primaryAction;
  $('nextName').textContent=state.nextLabel;$('nextAction').textContent=state.nextAction;
  $('passName').textContent=state.passLabel;$('passAction').textContent=state.passAction;
  $('avoidName').textContent=state.avoidLabel;$('avoidAction').textContent=state.avoidAction;
  function openMaps(destination){
    const value=String(destination||'').trim();if(!value)return;
    const url=new URL('https://www.google.com/maps/dir/');
    const locationStatus=document.querySelector('.yos-location-status');
    const latitude=locationStatus?.dataset.latitude;
    const longitude=locationStatus?.dataset.longitude;
    const accuracy=Number(locationStatus?.dataset.accuracy||NaN);
    const acquiredAt=Number(locationStatus?.dataset.acquiredAt||0);
    const locationIsFresh=acquiredAt>0&&Date.now()-acquiredAt<=5*60*1000;
    const locationIsAccurate=Number.isFinite(accuracy)&&accuracy<=200;
    url.searchParams.set('api','1');
    if(latitude&&longitude&&locationIsFresh&&locationIsAccurate)url.searchParams.set('origin',`${latitude},${longitude}`);
    url.searchParams.set('destination',value);url.searchParams.set('travelmode','driving');url.searchParams.set('dir_action','navigate');
    location.href=url.toString();
  }
  $('primaryGo').onclick=()=>openMaps(state.primary);
  document.querySelector('[data-target="next"]').onclick=()=>openMaps(state.next);
  document.querySelector('[data-target="pass"]').onclick=()=>openMaps(state.pass);
  document.querySelector('[data-target="avoid"]').onclick=()=>alert(`${state.avoidLabel}は現在の回避先です。ナビは開始しません。`);
  $('manualGo').onclick=()=>openMaps($('destination').value);
  $('destination').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();openMaps(e.currentTarget.value)}});
  const TIMER_KEY='yos-nav-wait-timer-v1';
  const readTimer=()=>{try{return JSON.parse(localStorage.getItem(TIMER_KEY)||'null')}catch{return null}};
  const writeTimer=value=>{try{localStorage.setItem(TIMER_KEY,JSON.stringify(value))}catch{}};
  const clearTimer=()=>{try{localStorage.removeItem(TIMER_KEY)}catch{}};
  let remaining=state.wait*60,timer=null,deadline=0,finished=false;
  const paint=()=>{$('timerText').textContent=`${String(Math.floor(remaining/60)).padStart(2,'0')}:${String(remaining%60).padStart(2,'0')}`};
  const stopTimer=()=>{if(timer)clearInterval(timer);timer=null};
  const persistTimer=()=>writeTimer({deadline,wait:state.wait,updatedAt:Date.now()});
  const finishTimer=()=>{if(finished)return;finished=true;stopTimer();remaining=0;paint();$('timerStatus').textContent='次候補へ';writeTimer({deadline:0,wait:state.wait,finished:true,updatedAt:Date.now()});navigator.vibrate?.([200,100,200])};
  const syncTimer=()=>{if(!deadline)return;remaining=Math.max(0,Math.ceil((deadline-Date.now())/1000));paint();if(remaining===0)finishTimer()};
  const saved=readTimer();
  if(saved&&Number(saved.wait)===state.wait){
    if(saved.finished){remaining=0;finished=true;$('timerStatus').textContent='次候補へ'}
    else if(Number(saved.deadline)>Date.now()){
      deadline=Number(saved.deadline);$('timerStatus').textContent='待機中';syncTimer();timer=setInterval(syncTimer,250)
    }else if(Number(saved.deadline)>0){remaining=0;finishTimer()}
  }
  paint();
  $('timerStart').onclick=()=>{
    if(timer||remaining===0)return;
    finished=false;deadline=Date.now()+remaining*1000;$('timerStatus').textContent='待機中';persistTimer();
    timer=setInterval(syncTimer,250);syncTimer();
  };
  $('timerReset').onclick=()=>{stopTimer();deadline=0;finished=false;remaining=state.wait*60;clearTimer();paint();$('timerStatus').textContent='未開始'};
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&deadline)syncTimer()});
  window.addEventListener('pageshow',()=>{if(deadline)syncTimer()});
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
})();
</script>
<script src="./shift-phase-v1.js"></script>
<script src="./location-status-v1.js"></script>
<script src="./connectivity-status-v1.js"></script>
</body>
</html>
