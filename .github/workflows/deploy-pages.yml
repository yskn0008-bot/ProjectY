name: Sync and deploy YOS Mission Control

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/mission-control.json'
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, assigned, unassigned]
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Synchronize GitHub state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_mission_control.py

      - name: Save synchronized state
        run: |
          if git diff --quiet -- data/mission-control.json; then
            echo "Mission Control data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mission-control.json
          git commit -m "data: sync GitHub state"
          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
